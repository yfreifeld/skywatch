apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skywatch
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Replace with your actual GitHub repo URL
    repoURL: https://github.com/yfreifeld/skywatch.git
    targetRevision: main
    path: helm/skywatch
    helm:
      releaseName: skywatch
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: skywatch

  syncPolicy:
    automated:
      prune: true      # Remove resources deleted from Git
      selfHeal: true   # Revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
