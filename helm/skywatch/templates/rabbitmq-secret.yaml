apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-rabbitmq
  labels:
    {{- include "skywatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Keys used by the RabbitMQ container
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.auth.username | quote }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.rabbitmq.auth.password | quote }}
  RABBITMQ_ERLANG_COOKIE: {{ .Values.rabbitmq.auth.erlangCookie | quote }}
  # Keys referenced by frontend and worker deployments
  rabbitmq-username: {{ .Values.rabbitmq.auth.username | quote }}
  rabbitmq-password: {{ .Values.rabbitmq.auth.password | quote }}
